# ---- SB Watchbot Active Settings (consolidated) ----
tick_size: 0.25

risk:
  # Buffer beyond the swept high/low, in integer ticks
  stop_buffer_ticks: 4      # try 4; if still too tight, 6–8
  tp1_r_multiple: 1.0
  tp2_r_multiple: 2.0
  # Safety floor so you don’t get microscopic R on quiet bars (optional)
  min_r_points: 1.0         # set to 1.0–1.25; remove to disable

tolerances:
  # Use integer ticks (no fractional ticks) to avoid micro set-ups
  sweep_ticks: 2                # how far beyond prior high/low qualifies as a sweep
  fvg_min_ticks: 4              # ≈ 1.0 point on NQ
  displacement_min_ticks: 8     # ≈ 2.0 points move
  refill_tolerance_ticks: 1
  level_tolerance_ticks: 3

sessions:
  # Keep your usual windows; example for NY 10:00–11:00 ET kill zone
  ny_kill_zone:
    start: "10:00"
    end: "11:00"
    tz: "America/New_York"
