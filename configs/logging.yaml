version: 1
formatters:
  simple:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: simple
    level: INFO
loggers:
  sbwatch:
    handlers: [console]
    level: INFO
    propagate: False
root:
  handlers: [console]
  level: INFO
